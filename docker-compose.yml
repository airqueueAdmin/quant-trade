services:
  backend:
    build:
      context: ./backend
    container_name: quant-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: quant-frontend
    depends_on:
      - backend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
    volumes:
      - ./frontend:/app
