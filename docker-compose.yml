services:
  backend:
    build:
      context: ./backend
    container_name: quant-backend
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_DB_SCHEMA: ${SUPABASE_DB_SCHEMA:-public}
      APPS_IN_TOSS_APP_NAME: ${APPS_IN_TOSS_APP_NAME:-glance-invest}
      APPS_IN_TOSS_CERT_PATH: /certs/glance-invest-mTLS_public.crt
      APPS_IN_TOSS_KEY_PATH: /certs/glance-invest-mTLS_private.key
      TOSS_SMART_MESSAGE_BASE_URL: ${TOSS_SMART_MESSAGE_BASE_URL:-https://apps-in-toss-api.toss.im}
      TOSS_SMART_MESSAGE_TEMPLATE_CODE: ${TOSS_SMART_MESSAGE_TEMPLATE_CODE:-glance-invest-reminder}
      TOSS_LOGIN_TOKEN_URL: ${TOSS_LOGIN_TOKEN_URL:-}
      TOSS_LOGIN_SANDBOX_TOKEN_URL: ${TOSS_LOGIN_SANDBOX_TOKEN_URL:-}
      TOSS_LOGIN_CLIENT_ID: ${TOSS_LOGIN_CLIENT_ID:-}
      TOSS_LOGIN_CLIENT_SECRET: ${TOSS_LOGIN_CLIENT_SECRET:-}
      TOSS_LOGIN_REDIRECT_URI: ${TOSS_LOGIN_REDIRECT_URI:-}
      TOSS_LOGIN_TOKEN_AUTH_METHOD: ${TOSS_LOGIN_TOKEN_AUTH_METHOD:-body}
      TOSS_LOGIN_ME_URL: ${TOSS_LOGIN_ME_URL:-https://apps-in-toss-api.toss.im/api-partner/v1/apps-in-toss/user/oauth2/login-me}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - ./backend:/app
      - ./mTLS:/certs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    container_name: quant-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
    volumes:
      - ./frontend:/app

  toss-inapp:
    build:
      context: ./toss-inapp
      args:
        VITE_BACKEND_URL: ${TOSS_INAPP_VITE_BACKEND_URL:-http://localhost:8000}
    container_name: quant-toss-inapp
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
